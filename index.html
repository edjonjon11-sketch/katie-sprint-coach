<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katie Sprint Coach</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  background:#050914;
  color:white;
}
.app{
  max-width:520px;
  margin:auto;
  padding:16px;
  padding-bottom:90px;
}
.header{
  padding:22px;
  border-radius:24px;
  background:linear-gradient(135deg,#2667ff,#5bd8ff);
  margin-bottom:16px;
}
h1{margin:0;font-size:28px}
.sub{opacity:.9;margin-top:6px}
.card{
  background:#101d33;
  border:1px solid #243b61;
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.screen{display:none}
.active{display:block}
.btn{
  width:100%;
  border:0;
  padding:15px;
  border-radius:16px;
  background:#2667ff;
  color:white;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}
.secondary{background:#243b55}
.good{background:#23a55a}
.warn{background:#ff9f0a}
input,select,textarea{
  width:100%;
  padding:14px;
  border:0;
  border-radius:14px;
  margin:7px 0;
  font-size:15px;
}
textarea{min-height:90px}
.calendarTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.dayName{
  text-align:center;
  color:#9fb3ce;
  font-size:13px;
}
.day{
  background:#0b1628;
  border:1px solid #1d3558;
  border-radius:14px;
  min-height:68px;
  padding:7px;
  text-align:center;
}
.day.today{
  border:2px solid #5bd8ff;
}
.day.done{
  background:#12351f;
}
.dayNum{font-weight:bold;font-size:18px}
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  margin:7px auto 0;
}
.recovery{background:#23a55a}
.training{background:#2667ff}
.coach{background:#a855f7}
.rest{background:#6b7280}
.warning{background:#ff9f0a}
.small{font-size:13px;color:#b9c6d6}
.step{
  background:#0b1628;
  padding:16px;
  border-radius:18px;
  margin-top:12px;
}
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#07111f;
  border-top:1px solid #243b61;
  display:flex;
  justify-content:space-around;
  padding:9px 4px;
}
.nav button{
  background:none;
  border:0;
  color:white;
  font-size:13px;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:20px;
  background:#2667ff;
  font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>🏃 Katie Sprint Coach</h1>
<div class="sub">Calendar • Coach Log • Recovery • Progress</div>
</div>

<!-- CALENDAR -->
<div id="calendarScreen" class="screen active">
  <div class="card">
    <div class="calendarTop">
      <button class="btn secondary" style="width:70px" onclick="changeMonth(-1)">‹</button>
      <h2 id="monthTitle"></h2>
      <button class="btn secondary" style="width:70px" onclick="changeMonth(1)">›</button>
    </div>

    <div class="grid">
      <div class="dayName">Sun</div>
      <div class="dayName">Mon</div>
      <div class="dayName">Tue</div>
      <div class="dayName">Wed</div>
      <div class="dayName">Thu</div>
      <div class="dayName">Fri</div>
      <div class="dayName">Sat</div>
    </div>

    <div id="calendarGrid" class="grid"></div>
  </div>

  <div class="card">
    <h3>Color Key</h3>
    <p>🟢 Recovery / Rest</p>
    <p>🔵 Training Day</p>
    <p>🟣 Coach Practice Logged</p>
    <p>🟠 Adjusted / Caution</p>
  </div>
</div>

<!-- DAY DETAIL -->
<div id="dayScreen" class="screen">
  <div class="card">
    <span class="badge" id="dayPhase"></span>
    <h2 id="selectedDateTitle"></h2>
    <p id="dayFocus"></p>
    <p id="smartAdvice" class="small"></p>

    <button class="btn" onclick="startSession()">Start Today</button>
    <button class="btn secondary" onclick="showCoachLog()">Log Coach Practice</button>
    <button class="btn secondary" onclick="showScreen('calendarScreen')">Back to Calendar</button>
  </div>

  <div id="sessionArea"></div>
</div>

<!-- COACH LOG -->
<div id="coachScreen" class="screen">
  <div class="card">
    <h2>Log Coach Practice</h2>
    <p id="coachDateText" class="small"></p>

    <select id="coachType">
      <option>Speed</option>
      <option>Acceleration</option>
      <option>Speed Endurance</option>
      <option>Tempo</option>
      <option>Starts</option>
      <option>Hurdles</option>
      <option>Strength</option>
      <option>Recovery</option>
      <option>Race / Meet</option>
    </select>

    <select id="coachIntensity">
      <option>Easy</option>
      <option>Moderate</option>
      <option>Hard</option>
      <option>Very Hard</option>
    </select>

    <input id="coachDuration" placeholder="Duration: 60 min, 90 min, 2 hours">
    <textarea id="coachNotes" placeholder="What did she do? Example: 5x300m, blocks, hurdles, flying 30s."></textarea>

    <button class="btn good" onclick="saveCoachLog()">Save Practice</button>
    <button class="btn secondary" onclick="openDay(selectedDate)">Back</button>
  </div>
</div>

<!-- PROGRESS -->
<div id="progressScreen" class="screen">
  <div class="card">
    <h2>Progress</h2>
    <p id="progressSummary"></p>
  </div>

  <div class="card">
    <h3>Recent Logs</h3>
    <div id="recentLogs"></div>
  </div>
</div>

</div>

<div class="nav">
<button onclick="showScreen('calendarScreen')">📅 Calendar</button>
<button onclick="openDay(new Date())">▶ Today</button>
<button onclick="showScreen('progressScreen');loadProgress()">📊 Progress</button>
</div>

<script>
let viewDate = new Date();
let selectedDate = new Date();

const startDate = new Date("2026-06-28T00:00:00");

function dateKey(d){
  return d.toISOString().split("T")[0];
}

function daysFromStart(d){
  const clean = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
  return Math.floor((clean - start) / (1000*60*60*24));
}

function getPlan(d){
  const diff = daysFromStart(d);
  const day = d.getDay();

  if(diff >= 0 && diff <= 9){
    const recovery = [
      "Complete Rest",
      "Walk + Light Stretch",
      "Complete Rest",
      "Pool / Bike Recovery",
      "Complete Rest",
      "Walk + Stretch",
      "Complete Rest",
      "Mobility Reset",
      "Easy Bike / Pool",
      "Rest + Body Check"
    ];
    return {
      phase:"Post-Season Recovery",
      type:"recovery",
      focus:recovery[diff] || "Recovery",
      work:["Sleep 9–10 hours","Hydrate","Eat well","No sprinting","No hard lifting"]
    };
  }

  if(diff >= 10 && diff <= 22){
    return {
      phase:"Light Rebuild",
      type: day===0 || day===3 ? "recovery":"training",
      focus: day===3 ? "Recovery Day" : "Light Mobility / Easy Movement",
      work:["Mobility","Light core","Easy bike/walk","Stretch","No max sprinting"]
    };
  }

  if(diff >= 23 && diff <= 29){
    return {
      phase:"Transition Week",
      type: day===0 || day===3 ? "recovery":"training",
      focus:"Sprint Mechanics / Light Acceleration",
      work:["Warm-up","A-skips","B-skips","4x20m at 70%","Stretch"]
    };
  }

  const week = {
    0:["Complete Rest","recovery",["Sleep","Hydrate","No training"]],
    1:["Acceleration & Power","training",["Warm-up","4x10m starts","4x20m starts","4x30m starts","Core","Stretch"]],
    2:["Strength Day","training",["Warm-up","Squats","RDL","Hip thrust","Rows","Core"]],
    3:["Recovery Day","recovery",["Pool or bike","Foam roll","Mobility","No sprinting"]],
    4:["Max Velocity","training",["Warm-up","Flying 20s","Flying 30s","Bounds","Stretch"]],
    5:["Strength + Plyometrics","training",["Box jumps","Broad jumps","Push press","Pull-ups","Core"]],
    6:["Tempo / Rhythm","training",["Warm-up","8x150m at 65–70%","Cooldown","Stretch"]]
  };

  return {
    phase:"Speed + Strength Build",
    type:week[day][1],
    focus:week[day][0],
    work:week[day][2]
  };
}

function getLogs(){
  return JSON.parse(localStorage.getItem("logs") || "[]");
}

function saveLogs(logs){
  localStorage.setItem("logs", JSON.stringify(logs));
}

function getLogForDate(key){
  return getLogs().find(l=>l.date===key);
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  renderCalendar();
}

function renderCalendar(){
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();

  document.getElementById("monthTitle").innerText =
    viewDate.toLocaleString("default",{month:"long"}) + " " + year;

  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  for(let i=0;i<first.getDay();i++){
    grid.innerHTML += `<div></div>`;
  }

  for(let d=1; d<=last.getDate(); d++){
    const dayDate = new Date(year, month, d);
    const key = dateKey(dayDate);
    const plan = getPlan(dayDate);
    const log = getLogForDate(key);
    const today = dateKey(new Date()) === key;

    let type = log?.coach ? "coach" : plan.type;
    let done = log?.completed ? "done" : "";

    grid.innerHTML += `
      <div class="day ${today?'today':''} ${done}" onclick="openDay(new Date(${year},${month},${d}))">
        <div class="dayNum">${d}</div>
        <div class="dot ${type}"></div>
        <div class="small">${log?.completed ? "Done" : plan.focus.split(" ")[0]}</div>
      </div>
    `;
  }
}

function changeMonth(num){
  viewDate.setMonth(viewDate.getMonth()+num);
  renderCalendar();
}

function openDay(d){
  selectedDate = d;
  const key = dateKey(d);
  const plan = getPlan(d);
  const log = getLogForDate(key);
  const advice = getSmartAdvice(d);

  document.getElementById("selectedDateTitle").innerText =
    d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  document.getElementById("dayPhase").innerText = plan.phase;
  document.getElementById("dayFocus").innerText =
    log?.coach ? "Coach Practice: " + log.coachType : "Today's Focus: " + plan.focus;

  document.getElementById("smartAdvice").innerText = advice;
  document.getElementById("sessionArea").innerHTML = "";

  showScreen("dayScreen");
}

function getSmartAdvice(d){
  const logs = getLogs();
  const yesterday = new Date(d);
  yesterday.setDate(yesterday.getDate()-1);
  const yLog = getLogForDate(dateKey(yesterday));

  const twoDays = new Date(d);
  twoDays.setDate(twoDays.getDate()-2);
  const twoLog = getLogForDate(dateKey(twoDays));

  const plan = getPlan(d);

  if(plan.phase === "Post-Season Recovery"){
    return "Recovery overrides normal training. No sprinting or hard lifting.";
  }

  if(yLog && yLog.coach && (yLog.intensity==="Hard" || yLog.intensity==="Very Hard")){
    return "Yesterday was a hard coach practice. Reduce today’s intensity and focus on recovery or lighter quality work.";
  }

  if(twoLog && twoLog.coach && twoLog.intensity==="Very Hard"){
    return "Very hard practice was logged recently. Watch soreness and avoid stacking too many hard days.";
  }

  if(plan.type === "recovery"){
    return "Today is designed to help the body absorb training and get faster later.";
  }

  return "Follow today’s plan. The app will adjust advice based on coach practices and recovery history.";
}

function startSession(){
  const plan = getPlan(selectedDate);
  const key = dateKey(selectedDate);

  let html = `
    <div class="card">
      <h2>Start Session</h2>
      <div class="step">
        <h3>Step 1: Readiness</h3>
        <select id="sleep"><option value="5">Sleep Great</option><option value="4">Sleep Good</option><option value="3">Sleep Okay</option><option value="2">Sleep Poor</option></select>
        <select id="soreness"><option value="5">Soreness None</option><option value="4">Soreness Light</option><option value="3">Soreness Moderate</option><option value="2">Soreness Heavy</option></select>
        <select id="energy"><option value="5">Energy High</option><option value="4">Energy Good</option><option value="3">Energy Okay</option><option value="2">Energy Low</option></select>
      </div>

      <div class="step">
        <h3>Step 2: Today's Work</h3>
        ${plan.work.map((x,i)=>`<label><input type="checkbox" id="task${i}"> ${x}</label><br><br>`).join("")}
      </div>

      <textarea id="notes" placeholder="Notes: how did the session feel?"></textarea>
      <button class="btn good" onclick="completeSession()">Finish & Save</button>
    </div>
  `;

  document.getElementById("sessionArea").innerHTML = html;
}

function completeSession(){
  const key = dateKey(selectedDate);
  const sleep = Number(document.getElementById("sleep").value);
  const soreness = Number(document.getElementById("soreness").value);
  const energy = Number(document.getElementById("energy").value);
  const readiness = Math.round(((sleep+soreness+energy)/15)*100);
  const notes = document.getElementById("notes").value;
  const plan = getPlan(selectedDate);

  let logs = getLogs();
  logs = logs.filter(l=>l.date!==key);

  logs.push({
    date:key,
    completed:true,
    coach:false,
    phase:plan.phase,
    focus:plan.focus,
    readiness,
    notes
  });

  saveLogs(logs);
  alert("Saved. Great job Katie.");
  openDay(selectedDate);
}

function showCoachLog(){
  document.getElementById("coachDateText").innerText =
    selectedDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  showScreen("coachScreen");
}

function saveCoachLog(){
  const key = dateKey(selectedDate);
  const type = document.getElementById("coachType").value;
  const intensity = document.getElementById("coachIntensity").value;
  const duration = document.getElementById("coachDuration").value;
  const notes = document.getElementById("coachNotes").value;

  let logs = getLogs();
  logs = logs.filter(l=>l.date!==key);

  logs.push({
    date:key,
    completed:true,
    coach:true,
    coachType:type,
    intensity,
    duration,
    notes
  });

  saveLogs(logs);

  document.getElementById("coachDuration").value="";
  document.getElementById("coachNotes").value="";

  alert("Coach practice saved.");
  openDay(selectedDate);
}

function loadProgress(){
  const logs = getLogs().sort((a,b)=>b.date.localeCompare(a.date));
  const completed = logs.filter(l=>l.completed).length;
  const coach = logs.filter(l=>l.coach).length;
  const avg = logs.filter(l=>l.readiness).length ?
    Math.round(logs.filter(l=>l.readiness).reduce((a,b)=>a+b.readiness,0)/logs.filter(l=>l.readiness).length) : 0;

  document.getElementById("progressSummary").innerHTML =
    `Days Completed: <b>${completed}</b><br>Coach Practices: <b>${coach}</b><br>Average Readiness: <b>${avg}%</b>`;

  document.getElementById("recentLogs").innerHTML = logs.slice(0,10).map(l=>`
    <div class="step">
      <b>${l.date}</b><br>
      ${l.coach ? "Coach Practice: "+l.coachType+" • "+l.intensity : l.focus}<br>
      <span class="small">${l.notes || l.duration || ""}</span>
    </div>
  `).join("") || "<p class='small'>No logs yet.</p>";
}

renderCalendar();
</script>

</body>
</html>
